<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#070d1a"/>
      <stop offset="100%" stop-color="#0d1526"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="glow" cx="50%" cy="0%" r="60%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow radial -->
  <ellipse cx="600" cy="0" rx="700" ry="400" fill="#3b82f6" fill-opacity="0.08"/>
  <ellipse cx="900" cy="500" rx="400" ry="250" fill="#8b5cf6" fill-opacity="0.05"/>

  <!-- Icon -->
  <rect x="80" y="220" width="64" height="64" rx="16" fill="#3b82f6"/>
  <polygon points="112,234 96,258 112,258 110,278 128,254 112,254" fill="white" stroke="none"/>

  <!-- App name -->
  <text x="164" y="256" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="600" fill="#9ca3af">Autocannon</text>
  <text x="164" y="276" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#4b5563">Dashboard</text>

  <!-- Main headline -->
  <text x="80" y="360" font-family="system-ui,-apple-system,sans-serif" font-size="68" font-weight="900" letter-spacing="-2" fill="url(#title)">Load testing,</text>
  <text x="80" y="440" font-family="system-ui,-apple-system,sans-serif" font-size="68" font-weight="900" letter-spacing="-2" fill="#f9fafb">beautifully visualised</text>

  <!-- Subtitle -->
  <text x="80" y="495" font-family="system-ui,-apple-system,sans-serif" font-size="24" fill="#6b7280">Real-time charts · Latency percentiles · Project management · Full autocannon config</text>

  <!-- Mini chart — req/s line -->
  <g transform="translate(750, 160)">
    <rect width="370" height="260" rx="12" fill="#111827" stroke="#1f2937" stroke-width="1"/>
    <text x="16" y="32" font-family="system-ui" font-size="10" fill="#4b5563" font-weight="600" letter-spacing="1" text-transform="uppercase">REQUESTS / SEC</text>
    <!-- Area fill -->
    <path d="M20,200 C50,190 80,170 110,160 C140,150 170,140 200,130 C230,120 260,110 290,100 C310,95 330,90 350,85 L350,220 L20,220 Z" fill="#3b82f620"/>
    <!-- Line -->
    <path d="M20,200 C50,190 80,170 110,160 C140,150 170,140 200,130 C230,120 260,110 290,100 C310,95 330,90 350,85" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Axes -->
    <line x1="20" y1="220" x2="350" y2="220" stroke="#1f2937" stroke-width="1"/>
    <!-- Labels -->
    <text x="20" y="240" font-family="monospace" font-size="9" fill="#374151">0s</text>
    <text x="160" y="240" font-family="monospace" font-size="9" fill="#374151">15s</text>
    <text x="340" y="240" font-family="monospace" font-size="9" fill="#374151">30s</text>
    <!-- Value -->
    <text x="16" y="60" font-family="monospace" font-size="28" font-weight="700" fill="#3b82f6">13,051</text>
    <text x="16" y="78" font-family="monospace" font-size="11" fill="#4b5563">req/s average</text>

    <!-- Mini latency lines -->
    <text x="16" y="110" font-family="system-ui" font-size="10" fill="#4b5563" font-weight="600" letter-spacing="1">LATENCY PERCENTILES</text>
    <path d="M16,130 C60,129 110,128 160,128 C210,128 260,127 340,127" fill="none" stroke="#22c55e" stroke-width="1.5"/>
    <path d="M16,133 C60,132 110,130 160,131 C210,132 260,130 340,129" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <path d="M16,140 C60,138 110,142 160,137 C210,132 260,135 340,130" fill="none" stroke="#ef4444" stroke-width="1.5"/>
    <circle cx="16" cy="130" r="3" fill="#22c55e"/>
    <text x="22" y="134" font-family="monospace" font-size="9" fill="#22c55e">p50 3.8ms</text>
    <circle cx="100" cy="130" r="3" fill="#f59e0b"/>
    <text x="106" y="134" font-family="monospace" font-size="9" fill="#f59e0b">p90 7.2ms</text>
    <circle cx="190" cy="130" r="3" fill="#ef4444"/>
    <text x="196" y="134" font-family="monospace" font-size="9" fill="#ef4444">p99 12.4ms</text>
  </g>

  <!-- Badges bottom right -->
  <rect x="80" y="555" width="80" height="24" rx="6" fill="#1f2937"/>
  <text x="90" y="571" font-family="monospace" font-size="11" fill="#9ca3af">MIT License</text>

  <rect x="172" y="555" width="100" height="24" rx="6" fill="#1f2937"/>
  <text x="182" y="571" font-family="monospace" font-size="11" fill="#9ca3af">Electron 33</text>

  <rect x="284" y="555" width="74" height="24" rx="6" fill="#1f2937"/>
  <text x="294" y="571" font-family="monospace" font-size="11" fill="#9ca3af">React 18</text>

  <rect x="370" y="555" width="60" height="24" rx="6" fill="#3b82f620" stroke="#3b82f640" stroke-width="1"/>
  <text x="380" y="571" font-family="monospace" font-size="11" fill="#60a5fa">Free</text>
</svg>
